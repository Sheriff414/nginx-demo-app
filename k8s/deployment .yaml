apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        envFrom:
        - secretRef:
            name: app-secrets
      volumes:
      - name: config-volume
        configMap:
          name: nginx-config